name: Backup Firestore

on:
  schedule:
    # 8:00 hora Argentina (UTC-3, sin horario de verano) = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        working-directory: app
        run: npm ci

      - name: Ejecutar backup
        working-directory: app
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: npm run backup

      - name: Commitear y pushear backup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || git commit -m "chore: backup automático de Firestore $(date -u +%F)"
          git push
