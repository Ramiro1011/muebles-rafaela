[build]
  command   = "cd app && npm install && npm run build"
  publish   = "app/build"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from   = "/api/publicar"
  to     = "/.netlify/functions/publicar"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
